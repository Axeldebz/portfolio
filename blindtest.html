<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLIND TEST — AXEL</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: #0A0516; }
    #gameOverlay { display: flex !important; }
  </style>
</head>
<body class="shell-body">

  <div id="gameOverlay">

    <!-- Selection du mode -->
    <div class="g-screen" id="gPanelStart">
      <p class="g-eyebrow">Un jeu signe Axel</p>
      <h2 class="swell g-bigtitle">BLIND<br>TEST</h2>
      <p class="g-hint">Teste ta culture musicale<br><em>90+ sons de la radio perso</em></p>
      <div class="bt-modes">
        <button class="bt-mode-card" data-mode="classic">
          <span class="bt-mc-icon">&#9835;</span>
          <span class="bt-mc-text">
            <strong class="bt-mc-name">CLASSIQUE</strong>
            <span class="bt-mc-desc">15s d'extrait — qui chante ?</span>
          </span>
        </button>
        <button class="bt-mode-card" data-mode="lyrics">
          <span class="bt-mc-icon">&#10077;</span>
          <span class="bt-mc-text">
            <strong class="bt-mc-name">QUI A DIT ?</strong>
            <span class="bt-mc-desc">Retrouve l'auteur des paroles</span>
          </span>
        </button>
        <button class="bt-mode-card" data-mode="album">
          <span class="bt-mc-icon">&#9673;</span>
          <span class="bt-mc-text">
            <strong class="bt-mc-name">QUEL ALBUM ?</strong>
            <span class="bt-mc-desc">Retrouve l'artiste derriere l'album</span>
          </span>
        </button>
      </div>
    </div>

    <!-- Manche en cours (plein ecran) -->
    <div id="gPanelGame">
      <div class="bt-topbar">
        <div class="bt-prog-wrap">
          <span class="bt-round-lbl" id="btRoundLbl">1 / 5</span>
          <div class="bt-prog-track"><div class="bt-prog-fill" id="btProgFill"></div></div>
        </div>
        <div class="bt-score-box">
          <span class="g-label">SCORE</span>
          <span class="bt-score-num swell" id="btScoreNum">0</span>
        </div>
      </div>

      <div class="bt-question-wrap" id="btQuestionWrap"></div>

      <div class="bt-choices" id="btChoices"></div>

      <div class="bt-timer-wrap" id="btTimerWrap">
        <div class="bt-timer-bar" id="btTimerBar"></div>
      </div>

      <div class="bt-feedback" id="btFeedback">
        <span id="btFeedbackText"></span>
      </div>

      <button class="bt-next-btn" id="btNext">SUIVANT &#8594;</button>
    </div>

    <!-- Recap final -->
    <div class="g-screen" id="gPanelOver">
      <p class="g-eyebrow">BILAN</p>
      <div class="swell g-bigtitle" id="gFinalScore">— / 5</div>
      <div class="bt-recap" id="btRecap"></div>
      <div class="bt-end-btns">
        <button class="g-btn swell" id="gBtnRetry">REJOUER &#8594;</button>
        <button class="g-btn" id="btBtnModes">MODES</button>
        <button class="g-btn" id="btBtnQuit">&#8592; PORTFOLIO</button>
      </div>
    </div>

    <button class="g-quit" id="gBtnQuit">&#8592; RETOUR</button>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
