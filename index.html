<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AXEL</title>
  <!-- Full stylesheet: fonts, CSS variables, jukebox styles -->
  <link rel="stylesheet" href="style.css" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #F5F0E8; }
    #pf {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body class="shell-body">

  <!-- Anti-recursion : si ce shell se charge dans sa propre iframe
       (ex. lien "← WORK" depuis une page projet), on redirige vers home.html -->
  <script>
    if (window.self !== window.top) {
      window.location.replace('home.html' + window.location.hash);
    }
  </script>

  <iframe id="pf" src="home.html" title="Portfolio Axel Bureau"></iframe>

  <script>
    (function () {
      const frame  = document.getElementById('pf');
      let isFirst  = true;
      let prog     = false; // navigation programmatique (popstate)

      /* Sync URL + titre quand l'iframe navigue */
      frame.addEventListener('load', function () {
        if (prog) { prog = false; return; }
        try {
          const path = frame.contentWindow.location.pathname;
          const hash = frame.contentWindow.location.hash;
          /* /portfolio/home.html → /portfolio/ */
          const display = path.replace(/\/home\.html$/, '/') + hash;
          document.title = frame.contentWindow.document.title || 'AXEL';

          if (isFirst) {
            history.replaceState({ p: path }, '', display);
            isFirst = false;
          } else {
            history.pushState({ p: path }, '', display);
          }
        } catch (e) { /* cross-origin guard (ne devrait pas arriver) */ }
      });

      /* Bouton retour du navigateur → met à jour l'iframe */
      window.addEventListener('popstate', function (e) {
        prog = true;
        var target = (e.state && e.state.p) ? e.state.p : 'home.html';
        frame.src = target;
      });
    })();
  </script>

  <script src="js/jukebox.js"></script>

  <script>
    /* ── Overlay de transition entre pages ── */
    (function () {
      const ov = document.createElement('div');
      ov.style.cssText = 'position:fixed;inset:0;z-index:990;background:#F5F0E8;opacity:0;pointer-events:none;transition:opacity 0.24s ease;';
      document.body.appendChild(ov);

      function showOv() { ov.style.opacity = '1'; ov.style.pointerEvents = 'all'; }
      function hideOv() { ov.style.opacity = '0'; setTimeout(() => { ov.style.pointerEvents = 'none'; }, 240); }

      window.addEventListener('message', e => { if (e.data && e.data.type === 'navStart') showOv(); });

      const frame = document.getElementById('pf');
      const _origLoad = frame.onload;
      frame.addEventListener('load', () => setTimeout(hideOv, 40));
    })();
  </script>
</body>
</html>
